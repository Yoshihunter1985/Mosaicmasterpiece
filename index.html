<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zach's Mosaic Masterpieces</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
    background-color: #e3000b;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 24px 24px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  .title-img {
    width: min(480px, 95vw);
    margin-bottom: 18px;
    display: block;
  }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    width: min(520px, 95vw);
    margin-bottom: 18px;
  }

  .topic-btn {
    background: #fff;
    border: none;
    border-radius: 16px;
    padding: 14px 8px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    color: #222;
    box-shadow: 0 4px 0 rgba(0,0,0,0.18);
    transition: transform 0.1s, box-shadow 0.1s;
    line-height: 1.2;
    text-align: center;
  }
  .topic-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.18); }
  .topic-btn img {
    width: 52px;
    height: 52px;
    object-fit: contain;
    mix-blend-mode: multiply;
  }
  .topic-btn.active {
    background: #ffe200;
    box-shadow: 0 4px 0 rgba(0,0,0,0.22);
  }

  .design-area {
    background: #fff;
    border-radius: 20px;
    padding: 20px 16px 16px;
    width: min(520px, 95vw);
    box-shadow: 0 6px 0 rgba(0,0,0,0.15);
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .design-area.visible { display: flex; }

  .design-title {
    font-size: 22px;
    font-weight: 900;
    color: #e3000b;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .plate-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }

  .plate-indicator img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    mix-blend-mode: multiply;
    flex-shrink: 0;
  }

  .orientation-badge {
    background: #e3000b;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .plate-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  canvas#plateCanvas {
    border-radius: 8px;
    image-rendering: pixelated;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    width: 100%;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 700;
    color: #333;
  }
  .legend-swatch {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid rgba(0,0,0,0.15);
    flex-shrink: 0;
  }

  .shuffle-btn {
    background: #e3000b;
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px 32px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }
  .shuffle-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
</style>
</head>
<body>

<img class="title-img" src="https://raw.githubusercontent.com/Yoshihunter1985/Mosaicmasterpiece/main/Zach-s-Mosaic-Masterpieces-6-8-2026.png" alt="Zach's Mosaic Masterpieces" onerror="this.style.display='none'">

<div class="topic-grid">
  <button class="topic-btn" onclick="selectTopic('ninjago', this)">
    <img src="https://raw.githubusercontent.com/Yoshihunter1985/Mosaicmasterpiece/main/kai.png" alt="">
    Ninjago
  </button>
  <button class="topic-btn" onclick="selectTopic('nature', this)">

  </button>
  <button class="topic-btn" onclick="selectTopic('starwars', this)">
    <img src="https://raw.githubusercontent.com/Yoshihunter1985/Mosaicmasterpiece/main/star wars.png" alt="">
    Star Wars
  </button>
  <button class="topic-btn" onclick="selectTopic('smallplate', this)">
    <img src="https://raw.githubusercontent.com/Yoshihunter1985/Mosaicmasterpiece/main/small plate various.png" alt="">

</div>

<div class="design-area" id="designArea">
  <div class="design-title" id="designTitle">Heart</div>
  <div class="plate-indicator">

// All small plate designs
function buildSmallPlateDesigns() {
  const designs = [];

  // Letters A-Z
  const allChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
  allChars.forEach((ch, i) => {
    const pair = PAIRS[i % PAIRS.length];
    const grid = makeLetter(ch, pair[0], pair[1], 4, 6);
    designs.push({
      name: ch.match(/[0-9]/) ? `Number ${ch}` : `Letter ${ch}`,
      orientation: 'portrait',
      orientLabel: 'Portrait · 4×6',
      cols: 4, rows: 6,
      grid

let currentTopic = null;
let currentDesign = null;

function selectTopic(topic, btn) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentTopic = topic;
  shuffle();
  document.getElementById('designArea').classList.add('visible');
}

function shuffle() {
  if (!currentTopic) return;
  const designs = TOPICS[currentTopic].designs;
  if (!designs.length) return;
  currentDesign = designs[Math.floor(Math.random() * designs.length)];
  renderDesign(currentDesign);
}

function renderDesign(d) {
  // Normalise grid — flatten nested arrays from editor exports
  if (Array.isArray(d.grid[0])) d.grid = d.grid.flat();
  document.getElementById('designTitle').textContent = d.name;
  document.getElementById('orientationBadge').textContent = d.orientLabel || 'Portrait · 4×6';

  const BASE = 'https://raw.githubusercontent.com/Yoshihunter1985/Mosaicmasterpiece/main/';
  const plateIcon = document.getElementById('plateIcon');
  if (d.isRound) {
    plateIcon.src = BASE + 'circle plate.png';
    plateIcon.style.display = 'block';
  } else if (d.isSemicircle) {
    plateIcon.src = BASE + 'semi circle.png';
    plateIcon.style.display = 'block';
  } else if (d.orientLabel && d.orientLabel.includes('4×6')) {
    plateIcon.src = BASE + 'small plate.png';
    plateIcon.style.display = 'block';
  } else {
    plateIcon.style.display = 'none';
  }

  const canvas = document.getElementById('plateCanvas');
  const cols = d.cols, rows = d.rows;
  const PAD = 6;
  canvas.width  = cols * CELL + PAD * 2;
  canvas.height = rows * CELL + PAD * 2;
  const ctx = canvas.getContext('2d');

  // Plate background (rectangular plates only)
  if (!d.isSemicircle && !d.isRound) {
    ctx.fillStyle = '#9E9E9E';
    ctx.beginPath();
    ctx.roundRect(0, 0, canvas.width, canvas.height, 10);
    ctx.fill();
  }

  // Draw studs
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const isActive = d.isSemicircle ? d.semiActive[r].includes(c) : d.isRound ? d.roundActive[r].includes(c) : true;
      if (!isActive) continue;
      const key = d.grid[r * cols + c];
      const x = PAD + c * CELL;
      const y = PAD + r * CELL;
      const colour = COLOUR_MAP[key];

      ctx.fillStyle = '#9E9E9E';
      ctx.beginPath();
      ctx.roundRect(x + 1, y + 1, CELL - 2, CELL - 2, 5);
      ctx.fill();

      if (colour) {
        ctx.fillStyle = colour.fill;
        ctx.beginPath();
        ctx.roundRect(x + 2, y + 2, CELL - 4, CELL - 4, 5);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.beginPath();
        ctx.arc(x + CELL/2, y + CELL/2, CELL * 0.2, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#787878';
        ctx.beginPath();
        ctx.roundRect(x + 2, y + 2, CELL - 4, CELL - 4, 5);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.beginPath();
        ctx.arc(x + CELL/2, y + CELL/2, CELL * 0.18, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Legend
  const counts = {};
  d.grid.forEach((k, i) => {
    if (k === '_' || !COLOUR_MAP[k]) return;
    if (d.isSemicircle) {
      const r = Math.floor(i / cols), c = i % cols;
      if (!d.semiActive[r].includes(c)) return;
    }
    if (d.isRound) {
      const r = Math.floor(i / cols), c = i % cols;
      if (!d.roundActive[r].includes(c)) return;
    }
    counts[k] = (counts[k]||0)+1;
  });
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '';
  Object.entries(counts).forEach(([k, v]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-swatch" style="background:${COLOUR_MAP[k].fill}"></div>${COLOUR_MAP[k].label}: ${v}`;
    legendEl.appendChild(item);
  });
}
